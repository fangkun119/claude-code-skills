<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标准 Markdown 图片格式测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        h2 {
            color: #555;
            margin-top: 30px;
        }
        p {
            margin: 10px 0;
        }
        img {
            display: block;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>标准 Markdown 图片格式测试</h1>

    <h2>基本 alt 文本</h2>
    <p>这是带描述文本的图片：</p>
    <img src="./assets/logo.png" style="display: block; width: 100%;" alt="产品 Logo">

    <h2>无 alt 文本</h2>
    <p>这是空的 alt 文本：</p>
    <img src="./images/no-description.png" style="display: block; width: 100%;" alt="">

    <h2>带宽度的图片</h2>
    <img src="./charts/data.png" style="display: block; width: 800px;" alt="数据图表">

    <h2>多种组合</h2>

    <h3>小图标</h3>
    <img src="./icons/small.png" style="display: block; width: 100%;" alt="图标">

    <h3>大横幅</h3>
    <img src="./banners/header.png" style="display: block; width: 1200px;" alt="横幅">

    <h3>中等尺寸</h3>
    <img src="./placeholder.png" style="display: block; width: 600px;" alt="">
</body>
</html>
